OsintSources:
  - Platform: URLScan
    Query: "page.url:*clickfix* OR page.url:*filefix*"
    URL: "https://urlscan.io/search/#page.url%3A*clickfix*%20OR%20page.url%3A*filefix*"
    Notes: Find active ClickFix lure pages; combine with page content search for clipboard JS
  - Platform: URLScan
    Query: "page.body:navigator.clipboard OR page.body:ClipboardItem"
    URL: "https://urlscan.io/search/#page.body%3Anavigator.clipboard%20OR%20page.body%3AClipboardItem"
    Notes: Find pages using clipboard manipulation JavaScript regardless of theme name; more resilient to lure-name changes than URL-based queries
  - Platform: VirusTotal Intelligence
    Query: 'behavior_network:"pastebin.com" tag:powershell'
    URL: "https://www.virustotal.com/gui/search/behavior_network%3A%22pastebin.com%22%20tag%3Apowershell"
    Notes: "Requires VT Intelligence subscription. Finds PowerShell samples that contacted Pastebin during sandbox execution — common ClickFix payload staging pattern. Pivot to behavior tab to inspect the full execution chain."

KnownBypasses:
  - Bypass: Hosting payload on legitimate platforms (Pastebin, GitHub, cloud storage)
    Mitigation: User awareness training; web filtering by content type rather than domain
    Detection: Focus on the execution context (browser parent + scripting interpreter), not the hosting domain
  - Bypass: Clipboard obfuscation (payload split across multiple copy operations)
    Mitigation: N/A — user still executes the final result
    Detection: Detect execution patterns, not clipboard content
  - Bypass: Delayed execution (sleep before outbound connection)
    Mitigation: N/A
    Detection: Extend the correlation time window in hunt/analyst rules
  - Bypass: macOS/Linux native interpreters (osascript, bash, zsh) evade Windows-only detection logic
    Mitigation: Enforce application allowlisting on macOS; restrict terminal access for non-technical users
    Detection: "On macOS, monitor for osascript or bash spawned from browser processes (Sysmon for Linux/macOS EID 1; Jamf/EDR telemetry); the parent-child relationship and outbound connection pattern is identical to the Windows case"

