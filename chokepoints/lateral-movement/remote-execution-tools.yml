OsintSources:
  - Platform: Shodan
    Query: "port:445 country:US"
    URL: "https://www.shodan.io/search?query=port%3A445+country%3AUS"
    Notes: "Find internet-exposed SMB — targets for external lateral movement and NTLM relay. Narrow with 'org:' or 'asn:' to scope to specific environments during red team or exposure assessments."
  - Platform: Shodan
    Query: 'port:5985 product:"Microsoft HTTPAPI"'
    URL: "https://www.shodan.io/search?query=port%3A5985+product%3A%22Microsoft+HTTPAPI%22"
    Notes: "Find internet-exposed WinRM endpoints (Evil-WinRM targets). Port 5986 is the HTTPS variant — run a second query substituting 5986 for full coverage."
  - Platform: GitHub Code Search
    Query: '"wmiexec" OR "smbexec" OR "atexec" path:*.py'
    URL: "https://github.com/search?q=%22wmiexec%22+OR+%22smbexec%22+OR+%22atexec%22+path%3A*.py&type=code"
    Notes: "Finds community tools and forks built on Impacket execution primitives; more targeted than a keyword search. Monitor for new modules that extend the execution surface beyond the known chokepoint."

KnownBypasses:
  - Bypass: Using legitimate service names that blend in with existing services
    Mitigation: Maintain baseline of approved services; alert on new service creation
    Detection: Correlate service creation with the binary path and network logon context
  - Bypass: Delayed execution after service creation
    Mitigation: N/A
    Detection: Extend correlation window; focus on IPC$ + service creation regardless of timing
  - Bypass: NTLM relay attacks instead of direct credential use
    Mitigation: Enable SMB signing and LDAP signing; disable NTLM where possible
    Detection: Detect relay patterns (source relays to destination within seconds of receiving auth)
  - Bypass: Using legitimate admin tools (psexec.exe from Sysinternals)
    Mitigation: Software allowlisting; monitor hash for known-good vs. impersonated versions
    Detection: Same IPC$ + service creation pattern applies; tool-agnostic detection covers this
  - Bypass: Living Off the Land (LOTL) — built-in Windows admin tools (winrs.exe, wmic /node:, Enter-PSSession, Invoke-Command)
    Mitigation: Restrict WinRM and WMI access via Windows Firewall; require PAW (Privileged Access Workstation) for remote admin; log and alert on PowerShell remoting to non-standard targets
    Detection: "These tools produce identical event telemetry to Impacket/NetExec (4624 LogonType 3, 4688 wmiprvse.exe child, 7045 service install) but with signed Microsoft binaries — no tool signature to match. Detection must be purely behavioral: network logon + protocol + execution primitive, regardless of which binary produced it. A 2024 analysis found 84% of high-severity attacks now use LOTL techniques."
  - Bypass: Kerberos-based lateral movement (Overpass-the-Hash, Pass-the-Ticket, Silver/Golden Tickets)
    Mitigation: Enable AES encryption for Kerberos; protect krbtgt account; monitor for anomalous TGS requests
    Detection: "Bypasses NTLM-relay mitigations and NTLM-focused detection entirely. Detect via Kerberos anomalies: Event ID 4769 (TGS request) with RC4 encryption when AES is expected; Event ID 4768 (TGT request) from non-DC hosts; unusual ticket lifetime or service name patterns. Impacket's getST.py and Rubeus are common tools for ticket forging."

